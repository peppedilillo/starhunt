services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  consumer:
    build: .
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
      GCN_CLIENT_ID: ${GCN_CLIENT_ID:?GCN_CLIENT_ID is required}
      GCN_CLIENT_SECRET: ${GCN_CLIENT_SECRET:?GCN_CLIENT_SECRET is required}
    command:
      - consume
      - /data/artifacts
      - --group-id
      - "${GCN_GROUP_ID:?GCN_GROUP_ID is required}"
      - --offset
      - "${GCN_OFFSET:?GCN_OFFSET is required}"
    volumes:
      - ${STARHUNT_ARTIFACT_DIR:?STARHUNT_ARTIFACT_DIR is required}:/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
    command:
      - work
      - /data/artifacts
    volumes:
      - ${STARHUNT_ARTIFACT_DIR:?STARHUNT_ARTIFACT_DIR is required}:/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: ${STARHUNT_WORKER_REPLICAS:-1}

  api:
    build: .
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
    command:
      - uvicorn
      - starhunt.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "${STARHUNT_API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres-test:
    image: postgres:16-bookworm
    profiles: ["test"]
    container_name: starhunt-postgres-test
    environment:
      POSTGRES_DB: starhunt_test
      POSTGRES_USER: starhunt_test
      POSTGRES_PASSWORD: starhunt_test
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starhunt_test -d starhunt_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
